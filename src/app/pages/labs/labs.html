<h1>Hola, este es mi primer proyecto en Angular</h1>
<h2>{{ welcomeMessage }}</h2>
<ul>
  <li *ngFor="let task of taskList">
    {{ task.title }}
  </li>
</ul>

<hr>

<h2>{{ 'Hola'.repeat(4) }}</h2>
<p>La suma de 3 + 4 es : {{ 3 + 4 }}</p>
<p>Hola, {{ name }}! Tienes {{ age }} años.</p>

<hr>

<img [src]="imgUrl" alt="Imagen de ejemplo"> <br>
<input type="number" [value]="person.age">
<button [disabled]="disabled">Click me</button>
<p>{{ person.name }}, {{ person.age }} años</p>
<img [src]="person.avatar" alt="Avatar de {{ person.name }}">
